services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    hostname: uptime-kuma
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - caddy_logs:/var/log/caddy
    environment:
      - TZ=Europe/Amsterdam
      - DOCKER_HOST=tcp://socket-proxy:2375
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - proxy
      - "internal network"
networks:
  proxy:
    external: true
  "internal network":
    external: true
volumes:
  caddy_logs:
    external: true

