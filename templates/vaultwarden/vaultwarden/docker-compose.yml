services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    env_file:
    - .env
    volumes:
      - ./data:/data
      - caddy_logs:/var/log/caddy
    ports:
      - 7777:80
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  caddy_logs:
    external: true