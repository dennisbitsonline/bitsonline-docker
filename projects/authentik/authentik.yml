services:
  postgresql:
    container_name: authentik-postgresql
    networks:
      - backend
    volumes:
      - caddy_logs:/var/log/caddy
      - docker_shared:/docker_shared
      - authentik_db:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      TZ: Europe/Amsterdam
      DOCKER_HOST: tcp://socket-proxy:2375
      POSTGRES_DB: ${AUTHENTIK_POSTGRESQL__NAME}
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD}
      POSTGRES_USER: ${AUTHENTIK_POSTGRESQL__USER}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
      - CMD-SHELL
      - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      timeout: 5s
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
  
  server:
    container_name: authentik_server
    networks:
      - proxy
      - backend
    volumes:
      - caddy_logs:/var/log/caddy
      - docker_shared:/docker_shared
      - ./data:/data
      - ./custom-templates:/templates
    command: server
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
    - .env
    environment:
      TZ: Europe/Amsterdam
      DOCKER_HOST: tcp://socket-proxy:2375
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRESQL__NAME}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD}
      AUTHENTIK_POSTGRESQL__USER: ${ AUTHENTIK_POSTGRESQL__USER}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.5.4}
    ports:
    - ${COMPOSE_PORT_HTTP:-9000}:9000
    - ${COMPOSE_PORT_HTTPS:-9443}:9443
    restart: unless-stopped
    shm_size: 512mb
    volumes:
    - ./data:/data
    - ./custom-templates:/templates

  worker:
    container_name: authentik-worker
    networks:
      - backend
    volumes:
      - caddy_logs:/var/log/caddy
      - docker_shared:/docker_shared
      - ./data:/data
      - ./certs:/certs
      - ./custom-templates:/templates
    command: worker
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
    - .env
    environment:
      TZ: Europe/Amsterdam
      DOCKER_HOST: tcp://socket-proxy:2375
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_POSTGRESQL__NAME}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD}
      AUTHENTIK_POSTGRESQL__USER: ${ AUTHENTIK_POSTGRESQL__USER}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.5.4}
    restart: unless-stopped
    shm_size: 512mb
    user: root

networks:
  proxy:
    external: true
  backend:
    external: true

volumes:
  database:
    driver: local
  caddy_logs:
    external: true
  docker_shared:
    external: true
